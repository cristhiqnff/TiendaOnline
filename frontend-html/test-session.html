<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test de Sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h1>Test del Sistema de Sesión</h1>
    
    <div class="row">
      <div class="col-md-6">
        <h3>Estado Actual</h3>
        <div id="estadoSesion" class="alert alert-info">
          Cargando...
        </div>
      </div>
      
      <div class="col-md-6">
        <h3>Acciones</h3>
        <button class="btn btn-primary me-2" onclick="testSetSession()">Establecer Sesión</button>
        <button class="btn btn-warning me-2" onclick="testClearSession()">Limpiar Sesión</button>
        <button class="btn btn-info me-2" onclick="testGetSession()">Ver Sesión</button>
        <button class="btn btn-secondary me-2" onclick="testUpdateHeader()">Actualizar Header</button>
      </div>
    </div>
    
    <div class="row mt-4">
      <div class="col-12">
        <h3>Header de Prueba</h3>
        <div class="border p-3">
          <span id="navGuest">Iniciar sesión | Registrarse</span>
          <span id="navUser" style="display:none;">
            <span id="navUserName">Nombre Usuario</span>
            <button id="btnLogout">Cerrar sesión</button>
          </span>
          <span id="navVendedor" style="display:none;">Panel de Vendedor</span>
          <span id="navAdmin" style="display:none;">Administración</span>
        </div>
      </div>
    </div>
    
    <div class="row mt-4">
      <div class="col-12">
        <h3>Console Log</h3>
        <div id="consoleLog" class="border p-3 bg-dark text-light" style="height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;">
          // Los logs aparecerán aquí...
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts del sistema -->
  <script src="session.js"></script>
  <script src="route-guard.js"></script>
  <script src="universal-init.js"></script>
  
  <script>
    // Funciones de test
    function testSetSession() {
      const user = {
        id: "123",
        nombre: "Juan Pérez",
        email: "juan@test.com",
        role: "cliente"
      };
      const token = "test-token-12345";
      
      const success = setSessionUser(user, token);
      log(success ? "✅ Sesión establecida" : "❌ Error al establecer sesión");
    }
    
    function testClearSession() {
      clearSession();
      log("🗑️ Sesión limpiada");
    }
    
    function testGetSession() {
      const user = getSessionUser();
      log("👤 Usuario actual: " + JSON.stringify(user, null, 2));
      log("🔍 ¿Está logueado? " + isLoggedIn());
      log("🎭 Rol: " + getUserRole());
    }
    
    function testUpdateHeader() {
      if (window.session) {
        window.session.updateHeader();
        log("🔄 Header actualizado");
      } else {
        log("❌ Session no disponible");
      }
    }
    
    function log(message) {
      const consoleLog = document.getElementById('consoleLog');
      const timestamp = new Date().toLocaleTimeString();
      consoleLog.innerHTML += `[${timestamp}] ${message}\n`;
      consoleLog.scrollTop = consoleLog.scrollHeight;
    }
    
    // Interceptar console.log para mostrar en la página
    const originalLog = console.log;
    console.log = function(...args) {
      originalLog.apply(console, args);
      log(args.join(' '));
    };
    
    // Actualizar estado cada 2 segundos
    setInterval(() => {
      const estadoDiv = document.getElementById('estadoSesion');
      const user = getSessionUser();
      
      if (user) {
        estadoDiv.className = 'alert alert-success';
        estadoDiv.innerHTML = `
          <strong>✅ Sesión Activa</strong><br>
          Usuario: ${user.nombre}<br>
          Email: ${user.email}<br>
          Rol: ${user.role}
        `;
      } else {
        estadoDiv.className = 'alert alert-warning';
        estadoDiv.innerHTML = '<strong>⚠️ No hay sesión activa</strong>';
      }
    }, 2000);
  </script>
</body>
</html>
