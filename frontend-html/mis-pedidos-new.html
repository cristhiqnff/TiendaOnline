<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pedidos - Tienda Online</title>
  <meta name="description" content="Consulta y gestiona tus pedidos en Tienda Online">
  <meta name="keywords" content="pedidos, compras, historial, tienda online">
  
  <!-- CSS Base -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  
  <!-- Variables de página para JavaScript -->
  <script>
    window.PAGE_CONFIG = {
      title: 'Mis Pedidos',
      section: 'mis-pedidos',
      userRole: '',
      requiresAuth: 'true',
      requiresVendedor: 'false',
      requiresAdmin: 'false',
      breadcrumb: [
        { label: 'Inicio', url: 'index.html' },
        { label: 'Mis Pedidos', url: 'mis-pedidos.html' }
      ],
      bodyClass: '',
      headerClass: 'ml-header-dark',
      mainClass: 'container my-4'
    };
  </script>
</head>
<body>
  <!-- Header -->
  {{HEADER}}
  
  <!-- Breadcrumb -->
  {{BREADCRUMB}}
  
  <!-- Contenido Principal -->
  <main class="container my-4">
    <div class="page-header">
      <h1>Mis Pedidos</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
          <li class="breadcrumb-item active">Mis Pedidos</li>
        </ol>
      </nav>
    </div>

    <div class="content-section">
      <!-- Filtros y búsqueda -->
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-search"></i></span>
            <input type="text" class="form-control" id="buscarPedido" placeholder="Buscar por ID, producto o fecha...">
          </div>
        </div>
        <div class="col-md-3">
          <select class="form-select" id="filtroEstado">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="enviado">Enviado</option>
            <option value="entregado">Entregado</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
        <div class="col-md-3">
          <select class="form-select" id="filtroPeriodo">
            <option value="">Todos los períodos</option>
            <option value="7">Últimos 7 días</option>
            <option value="30">Últimos 30 días</option>
            <option value="90">Últimos 3 meses</option>
            <option value="365">Último año</option>
          </select>
        </div>
      </div>

      <!-- Lista de pedidos -->
      <div id="pedidosContainer">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
          <p class="mt-2 text-muted">Cargando tus pedidos...</p>
        </div>
      </div>

      <!-- Paginación -->
      <nav aria-label="Paginación de pedidos" class="mt-4">
        <ul class="pagination justify-content-center" id="pagination">
          <!-- La paginación se generará dinámicamente -->
        </ul>
      </nav>
    </div>
  </main>
  
  <!-- Footer -->
  {{FOOTER}}
  
  <!-- Scripts Base -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="components/loader.js"></script>
  <script src="auth.js"></script>
  <script src="cart.js"></script>
  <script src="ui.js"></script>
  
  <!-- Scripts Adicionales -->
  <script src="auth-ui.js"></script>
  <script src="mis-pedidos.js"></script>
  
  <!-- Script de inicialización automática -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Inicializar componentes
      if (window.ComponentLoader) {
        window.ComponentLoader.init();
      }
      
      // Validar acceso si es necesario
      if (window.PAGE_CONFIG.requiresAuth && window.auth) {
        if (!window.auth.isLoggedIn()) {
          window.location.href = 'login.html';
          return;
        }
      }
      
      // Actualizar año actual
      if (window.ui && window.ui.setYear) {
        window.ui.setYear();
      }
      
      // Inicializar navegación
      if (window.ui && window.ui.initNavigation) {
        window.ui.initNavigation();
      }
      
      // Ejecutar función específica de página si existe
      if (typeof window.initPage === 'function') {
        window.initPage();
      }
    });
  </script>
</body>
</html>
