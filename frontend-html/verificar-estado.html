<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificar Estado de localStorage</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h1>Estado de localStorage</h1>
    
    <div class="row">
      <div class="col-md-6">
        <h3>Claves en localStorage</h3>
        <div id="claves" class="border p-3 bg-light"></div>
      </div>
      
      <div class="col-md-6">
        <h3>Valores</h3>
        <div id="valores" class="border p-3 bg-light"></div>
      </div>
    </div>
    
    <div class="row mt-3">
      <div class="col-12">
        <button class="btn btn-danger" onclick="limpiarTodo()">Limpiar Todo</button>
        <button class="btn btn-primary" onclick="recargar()">Recargar</button>
      </div>
    </div>
  </div>

  <script>
    function mostrarEstado() {
      const clavesDiv = document.getElementById('claves');
      const valoresDiv = document.getElementById('valores');
      
      const claves = Object.keys(localStorage);
      const valores = {};
      
      claves.forEach(key => {
        valores[key] = localStorage.getItem(key);
      });
      
      clavesDiv.innerHTML = '<pre>' + JSON.stringify(claves, null, 2) + '</pre>';
      valoresDiv.innerHTML = '<pre>' + JSON.stringify(valores, null, 2) + '</pre>';
    }
    
    function limpiarTodo() {
      localStorage.clear();
      mostrarEstado();
    }
    
    function recargar() {
      mostrarEstado();
    }
    
    // Mostrar estado al cargar
    mostrarEstado();
    
    // Actualizar cada segundo
    setInterval(mostrarEstado, 1000);
  </script>
</body>
</html>
