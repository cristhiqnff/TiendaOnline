<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Sistema Unificado</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h1>Test del Sistema Unificado de Autenticación</h1>
    
    <div class="row">
      <div class="col-md-6">
        <h3>Estado Actual</h3>
        <div id="estadoSesion" class="alert alert-info">
          Cargando...
        </div>
      </div>
      
      <div class="col-md-6">
        <h3>Acciones</h3>
        <div class="d-grid gap-2">
          <button class="btn btn-primary" onclick="testSetSessionCliente()">Establecer Cliente</button>
          <button class="btn btn-success" onclick="testSetSessionVendedor()">Establecer Vendedor</button>
          <button class="btn btn-danger" onclick="testSetSessionAdmin()">Establecer Admin</button>
          <button class="btn btn-warning" onclick="testClearSession()">Limpiar Sesión</button>
          <button class="btn btn-info" onclick="testGetSession()">Ver Sesión</button>
        </div>
      </div>
    </div>
    
    <div class="row mt-4">
      <div class="col-12">
        <h3>Header de Prueba</h3>
        <div class="border p-3 bg-light">
          <div class="d-flex gap-3 align-items-center flex-wrap">
            <span id="navGuest">
              <a href="#" class="text-decoration-none">Iniciar sesión</a> | 
              <a href="#" class="text-decoration-none">Registrarse</a>
            </span>
            <span id="navUser" style="display:none;">
              <span id="navUserName">Nombre Usuario</span>
              <button id="btnLogout" class="btn btn-sm btn-outline-secondary">Cerrar sesión</button>
            </span>
            <span id="navVendedor" style="display:none;">
              <a href="#" class="text-decoration-none">Panel de Vendedor</a>
            </span>
            <span id="navAdmin" style="display:none;">
              <a href="#" class="text-decoration-none">Administración</a>
            </span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="row mt-4">
      <div class="col-12">
        <h3>Console Log</h3>
        <div id="consoleLog" class="border p-3 bg-dark text-light" style="height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px;">
          // Los logs aparecerán aquí...
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts del sistema unificado -->
  <script src="auth-unified.js"></script>
  <script src="route-guard.js"></script>
  <script src="universal-init.js"></script>
  
  <script>
    // Funciones de test
    function testSetSessionCliente() {
      const user = {
        id: "123",
        nombre: "Juan Cliente",
        email: "juan@cliente.com",
        roles: ["CLIENTE"]
      };
      const token = "token-cliente-12345";
      
      const success = setSession(user, token);
      log(success ? "✅ Sesión de cliente establecida" : "❌ Error al establecer sesión");
    }
    
    function testSetSessionVendedor() {
      const user = {
        id: "456",
        nombre: "María Vendedora",
        email: "maria@vendedor.com",
        roles: ["VENDEDOR"]
      };
      const token = "token-vendedor-67890";
      
      const success = setSession(user, token);
      log(success ? "✅ Sesión de vendedor establecida" : "❌ Error al establecer sesión");
    }
    
    function testSetSessionAdmin() {
      const user = {
        id: "789",
        nombre: "Carlos Administrador",
        email: "carlos@admin.com",
        roles: ["ADMIN"]
      };
      const token = "token-admin-11111";
      
      const success = setSession(user, token);
      log(success ? "✅ Sesión de admin establecida" : "❌ Error al establecer sesión");
    }
    
    function testClearSession() {
      clearSession();
      log("🗑️ Sesión limpiada");
    }
    
    function testGetSession() {
      const user = getUser();
      const roles = getRoles();
      
      log("👤 Usuario actual: " + JSON.stringify(user, null, 2));
      log("🎭 Roles: " + JSON.stringify(roles, null, 2));
      log("🔍 ¿Está logueado? " + isLoggedIn());
      log("👤 ¿Es cliente? " + isCliente());
      log("🛍️ ¿Es vendedor? " + isVendedor());
      log("👑 ¿Es admin? " + isAdmin());
    }
    
    function log(message) {
      const consoleLog = document.getElementById('consoleLog');
      const timestamp = new Date().toLocaleTimeString();
      consoleLog.innerHTML += `[${timestamp}] ${message}\n`;
      consoleLog.scrollTop = consoleLog.scrollHeight;
    }
    
    // Interceptar console.log para mostrar en la página
    const originalLog = console.log;
    console.log = function(...args) {
      originalLog.apply(console, args);
      log(args.join(' '));
    };
    
    // Actualizar estado cada 2 segundos
    setInterval(() => {
      const estadoDiv = document.getElementById('estadoSesion');
      const user = getUser();
      
      if (user) {
        estadoDiv.className = 'alert alert-success';
        estadoDiv.innerHTML = `
          <strong>✅ Sesión Activa</strong><br>
          Usuario: ${user.nombre}<br>
          Email: ${user.email}<br>
          Roles: ${user.roles.join(', ')}
        `;
      } else {
        estadoDiv.className = 'alert alert-warning';
        estadoDiv.innerHTML = '<strong>⚠️ No hay sesión activa</strong>';
      }
    }, 2000);
  </script>
</body>
</html>
