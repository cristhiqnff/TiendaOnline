<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Tienda Online</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="ml-header">
    <div class="container py-2">
      <div class="d-flex gap-3 align-items-center">
        <a class="ml-brand" href="index.html">Tienda Online</a>
        <form class="flex-grow-1" role="search" onsubmit="return false;">
          <input class="form-control" type="search" placeholder="Buscar productos, marcas y más..." aria-label="Buscar">
        </form>
        <a class="btn btn-outline-dark position-relative" href="carrito.html" aria-label="Carrito">
          Carrito
          <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;">0</span>
        </a>
      </div>
      <div class="d-flex gap-3 mt-2 small align-items-center flex-wrap">
        <a class="text-dark text-decoration-none" href="categorias.html">Categorías</a>
        <a class="text-dark text-decoration-none" href="producto.html">Productos</a>
        <a class="text-dark text-decoration-none" href="mis-pedidos.html">Mis pedidos</a>
        <span id="navAdmin" style="display:none;"><a class="text-dark text-decoration-none" href="admin.html">Administración</a></span>
        <span id="navGuest"><a class="text-dark text-decoration-none" href="login.html">Iniciar sesión</a> <a class="text-dark text-decoration-none" href="registro.html">Registrarse</a></span>
        <span id="navUser" style="display:none;" class="ms-auto d-flex gap-3 align-items-center">
          <a class="text-dark text-decoration-none" href="perfil.html"><span id="navUserName">Mi cuenta</span></a>
          <button class="btn btn-sm btn-outline-dark" type="button" id="btnLogout">Cerrar sesión</button>
        </span>
      </div>
    </div>
  </header>

  <nav class="bg-light border-bottom">
    <div class="container py-2">
      <a href="carrito.html" class="text-decoration-none text-muted">← Volver al carrito</a>
      <span class="text-muted mx-1">/</span>
      <span class="text-dark fw-semibold">Checkout</span>
    </div>
  </nav>

  <main class="container my-4">
    <h1 class="h3 mb-4">Finalizar compra</h1>
    
    <div class="row g-4">
      <div class="col-lg-8">
        <form id="checkoutForm" novalidate>
          <!-- Dirección de envío -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h2 class="h5 mb-3">Dirección de envío</h2>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="direccion" class="form-label">Dirección *</label>
                  <input type="text" class="form-control" id="direccion" required>
                </div>
                <div class="col-md-3">
                  <label for="depto" class="form-label">Depto/Apto *</label>
                  <input type="text" class="form-control" id="depto" required>
                </div>
                <div class="col-md-3">
                  <label for="ciudad" class="form-label">Ciudad *</label>
                  <input type="text" class="form-control" id="ciudad" required>
                </div>
                <div class="col-md-6">
                  <label for="telefono" class="form-label">Teléfono *</label>
                  <input type="tel" class="form-control" id="telefono" required>
                </div>
                <div class="col-md-6">
                  <label for="indicaciones" class="form-label">Indicaciones</label>
                  <input type="text" class="form-control" id="indicaciones" placeholder="Ej: Conjunto, torre, apartamento">
                </div>
              </div>
            </div>
          </div>

          <!-- Método de pago -->
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h2 class="h5 mb-3">Método de pago</h2>
              <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="metodoPago" id="contraEntrega" value="contra_entrega" checked>
                <label class="form-check-label" for="contraEntrega">
                  Contra entrega (efectivo o tarjeta)
                </label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="metodoPago" id="nequi" value="nequi">
                <label class="form-check-label" for="nequi">
                  Nequi
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="metodoPago" id="tarjeta" value="tarjeta">
                <label class="form-check-label" for="tarjeta">
                  Tarjeta de crédito/débito
                </label>
              </div>
            </div>
          </div>

          <!-- Botón de envío -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="fas fa-lock"></i> Confirmar pedido
            </button>
          </div>
        </form>
        
        <div id="checkoutMsg" class="mt-3"></div>
      </div>

      <!-- Resumen del pedido -->
      <div class="col-lg-4">
        <div class="card shadow-sm p-4">
          <h2 class="h5 mb-3">Resumen del pedido</h2>
          <div id="resumen"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <div class="container small">© 2025 Tienda Online — Todos los derechos reservados</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="session.js"></script>
  <script src="route-guard.js"></script>
  <script src="universal-init.js"></script>
  <script src="cart.js"></script>
  <script src="ui.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
